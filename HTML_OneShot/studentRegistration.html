<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Registration Form </h1>
    <form action="">
        <fieldset>
            <legend>Personal Information </legend>
            <label for="">Full Name :</label><br>
            <input type="text" name="fullname" id="" placeholder="Enter your Full Name ">
            <br><br>

            <label for="">Email :</label><br>
            <input type="text" name="email" id="" placeholder="Enter your Email ">
            <br><br>
            
            <label for="">Password :</label><br>
            <input type="text" placeholder="Enter the Password ">
            <br><br>

            <label for="">Age</label><br>
            <input type="number" placeholder="Enter the Age">
            <br><br>

            <label for="">Mobile Number :</label><br>
            <input type="tel" pattern="[0-9]{10}" placeholder="Enter your Mobile Number ">
            <br><br>

        </fieldset>

        <fieldset>
            <legend>Other Datails</legend>
            <label for="">Gender</label> <br>
            <input type="radio" name="gender"><label for="">Male</label>
            <input type="radio" name="gender"><label for="">Female</label>
            <input type="radio" name="gender"><label for="">Other</label><br>
            <br><label for="">Skills :</label><br>
            <input type="checkbox"><label for="">HTML</label>
            <input type="checkbox"><label for="">CSS</label>
            <input type="checkbox"><label for="">JavaScript</label>
            <br><br>

            <label for="">Course :</label>
            <select name="course" id="">
                <option value=""></option>
                <option value="mca">MCA</option>
                <option value="bca">BCA</option>
                <option value="bcs">BCS</option>
                <option value="mba">MBA</option>
            </select>
            <br><br>

            <label for="">Hobbies :</label><br>
            <select multiple size=4>
                <option value="">reading</option>
                <option value="">Coding</option>
                <option value="">Cricket</option>
                <option value="">Music</option>
            </select>

            <br><br>
            <label for="">Upload Resume</label><br>
            <input type="file"  accept="" id="">
            <br><br>

            <label for="">Address :</label><br>
            <textarea name="address" id="" placeholder="Enter the Address"></textarea>
            <br><br>

            <label for="">Student ID :</label><br>
            <input type="text" name="studentid" id="" placeholder="Eneyer the Student Id">
            <br><br>

            <label for="">Collage Name :</label>
            <input type="text" name="" id="" placeholder="Enter the Collage Name :">


            <br><br>
            <button>Submit</button>
        </fieldset>


    </form>
    
</body>
</html>
