<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    


    <form >
        <fieldset >
            <legend>Log In</legend>

        <label for="username">Username :</label>
        <input type="text" id="username" placeholder="Enter the Username">

        <br>
        <br>

        <label for="password">Password :</label>
        <input type="text" id="password" placeholder="Enter the Password">

        <br>
        <br>

        <button>login</button>

</fieldset>

    </form>


    <br><br><br><br>

    <form action="">
        <fieldset>
            <legend>Sign Up Process</legend><br>

        <label for="first name">First Name :</label>
        <input type="text" name="first name" placeholder="Enter the Fist Name " maxlength="15">
        <br><br>

        <label for="last name">Last Name :</label>
        <input type="text" name="last name " placeholder="Enter the Last Name " maxlength="15">
        <br><br>

        <label for="email">Email :</label>
        <input type="email" name="email" placeholder="Enter the Email " maxlength="20">
        <br><br>

        <label for="phone">Phone :</label>
        <input type="tel" pattern="[0-9]{10}" name="phone"  placeholder="Enter the Phone Number ">
        <br><br>

        <label for="gender">Gender :</label>
        <input type="radio" name="gender" ><label for="">Male</label><input type="radio" name="gender" ><label for="">Female</label>

        <br><br>
        <label for="">Skills :</label><input type="checkbox"><label for="">Java</label>
        <input type="checkbox"><label for="Python">Python</label>
        <input type="checkbox"><label for="">MERN</label>
        <input type="checkbox"><label for="">PERN</label>
        <input type="checkbox"><label for="">JAVA full stack</label>
        <br><br>
        
        <label for="">Qulaification :</label>
        <select name="" id="">
            <option value="default"></option>
            <option value="mca">MCA</option>
            <option value="bca">BCA</option>
            <option value="bcs">BCS</option>
            <option value="btake">Btake</option>
        </select>

        <br><br>
        <label for="">DOB :</label>
        <input type="date" name="dob" max="2007-01-01">
        <br><br>

        <label for="address">Address :</label>
        <textarea name="address" id="" placeholder="Enter the address"></textarea>
        <br><br>


        <label for="photo">Photo</label>
        <input type="file" name="photo" accept="">
        <br><br>

        <label for="pincode">Pin-Code :</label>
        <input type="number" pattern="[0-9]{6}" name="pincode" maxlength="6">
        <br><br>

        <button>Sign Up</button><br>
        </fieldset>
    </form>
    <br><br><br><br>

    <form action="">
        <fieldset>
        <legend>Table with From</legend>
        <table>
            <tr>
                <td><label for="">User Name :</label></td>
                <td><input type="text" name="" id="" placeholder="Enter the User name "></td>
            </tr>

            <tr>
                <td><label for="">Password :</label></td>
                <td><input type="text" name="" id="" placeholder="Enter the Password "></td>
            </tr>

            <tr>
                <td><label for="">Conferm Passwrod :</label></td>
                <td><input type="text" name="" id="" placeholder="Enter the Conferm Password "></td>
            </tr>
        </table>
        </fieldset>
    </form>





    <br><br><br><br><br>
    <form action="">
        <fieldset>
            <legend>FeedBack From</legend>
            <label for="">Name :</label><br>
            <input type="text" name="" id="" placeholder="Enter the Name ">
            <br><br>
            <label for="">Email :</label><br>
            <input type="email" name="" id="" placeholder="Enter the Email">
            <br><br>
            <label for="">Adress :</label><br>
            <textarea name="" id="" placeholder="Enter the Address"></textarea>
            <br><br>
            <button>Submit</button>
    </form>

</body>
</html>
