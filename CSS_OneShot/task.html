<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
        }

        .div1{
            width: 260px;
            padding: 20px;
            border: 2px solid gray;
            border-radius: 10px;
            text-align: center;

            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;

            background-color: white;
            box-shadow:0 0 10px rgb(3, 1, 2);
        }
        .div1:hover{
            background-color: rgb(251, 242, 242);
        }

        img{
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
        }

        h2{
            color: navy;
        }

        p{
            color: #555;
            line-height: 1.5;
        }

        button{
            height: 40px;
            width: 80px;
            background-color: rgb(88, 150, 230);
            color: white;
            border: solid;
            border-radius: 10px;

        }

        button:hover{
            background-color: white;
            color: black;
            border-color: black;
        }
    </style>
</head>

<body>

    <div class="div1">
        <img src="./marvel.jpeg" alt="Profile Image">

        <h2>Pradeep Taware</h2>

        <p>
            Java Full Stack Developer passionate about building beautiful
            and interactive web applications using HTML, CSS, JavaScript,
            React, and Java.
        </p>
        <button>Follow</button>
    </div>

</body>
</html>
